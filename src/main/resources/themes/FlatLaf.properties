PasswordField.revealIcon=raven.modal.demo.icons.PasswordRevealIcon

[style]ToggleButton.revealButton=\
  border:5,0,5,5;\
  toolbar.selectedBackground:null;\
  toolbar.hoverBackground:null;\
  toolbar.pressedBackground:null;

[style]Label.redBadge=\
    arc:8;\
    border:2,5,2,5;\
    foreground:#f43f5e;\
    background:fade(#f43f5e,10%);

[style]Label.greenBadge=\
    arc:8;\
    border:2,5,2,5;\
    foreground:#1f9669;\
    background:fade(#1f9669,10%);

[style]Panel.DashboardBackground=\
    [dark]background:tint($Panel.background,3%);\
    [light]background:tint($Panel.background,25%);\
    border:3,3,3,3,$Separator.foreground,,15;

[style]Button.actionButton=\
    arc:8;\
    [dark]borderColor:darken(#16C47F,10%);\
    [light]borderColor:#16C47F;\
    [dark]foreground:darken(#16C47F,10%);\
    [light]foreground:#16C47F;\
    background:null;\
    focusColor:null;\
    hoverBorderColor:null;\
    focusedBorderColor:null;\
    font:bold 16;

[style]TextField.searchField=\
    arc:8;\
    [dark]foreground:darken(#16C47F,10%);\
    [light]foreground:#16C47F;\
    background:null;\
    focusColor:null;\
    font:16;

[style]TextField.serviceSearchField=\
    arc:8;\
    [dark]focusedBorderColor:darken(#16C47F,10%);\
    [light]focusedBorderColor:#16C47F;\
    [dark]foreground:darken(#16C47F,10%);\
    [light]foreground:#16C47F;\
    background:null;\
    focusColor:null;\
    font:14;

[style]Panel.editServicePanel=\
    arc:8;\
    background:$Table.background;
